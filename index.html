<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Escape Room 3D</title>

<style>
body { margin:0; overflow:hidden; touch-action:none; background:black; }
canvas { display:block; }

/* CROSSHAIR */
#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  transform:translate(-50%,-50%);
  border:2px solid white;
  border-radius:50%;
  pointer-events:none;
}

/* JOYSTICK */
#joystickBase{
  position:absolute;
  bottom:60px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#joystickStick{
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:35px;
  left:35px;
}

/* USE BUTTON */
#useBtn{
  position:absolute;
  bottom:80px;
  right:40px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:red;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* WIN */
#win{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  color:white;
  font-size:30px;
}
</style>
</head>

<body>

<div id="crosshair"></div>

<div id="joystickBase">
  <div id="joystickStick"></div>
</div>

<div id="useBtn">USE</div>

<div id="win">🎉 YOU ESCAPED!</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let raycaster = new THREE.Raycaster();

let interactables = [];

let moveX = 0, moveZ = 0;
let keyFound = false;

/* CAMERA LOOK */
let yaw = 0;
let isLooking = false;
let lastX = 0;

/* INIT */
init();
animate();

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,1.6,5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  /* LIGHTING (FIX DARKNESS) */
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const light = new THREE.PointLight(0xffffff, 1.2);
  light.position.set(0,5,0);
  scene.add(light);

  /* FLOOR */
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  /* WALLS */
  wall(0,2,-10);
  wall(0,2,10);
  wall(-10,2,0,Math.PI/2);
  wall(10,2,0,Math.PI/2);

  /* TABLE */
  const table = new THREE.Mesh(
    new THREE.BoxGeometry(2,0.2,1),
    new THREE.MeshStandardMaterial({color:0x8B5A2B})
  );
  table.position.set(0,0.75,0);
  scene.add(table);

  /* DOOR */
  let door = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,0.2),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  door.position.set(0,1.5,-9.9);
  door.userData = {type:"door"};
  interactables.push(door);
  scene.add(door);

  /* 40 DRAWERS */
  for(let i=0;i<40;i++){
    let d = new THREE.Mesh(
      new THREE.BoxGeometry(0.3,0.2,0.3),
      new THREE.MeshStandardMaterial({
        color: i===19 ? 0xffd700 : 0x777777
      })
    );

    d.position.set(
      -4 + (i%10)*0.8,
      1,
      -2 + Math.floor(i/10)*0.6
    );

    d.userData = {
      type:"drawer",
      hasKey: i===19
    };

    interactables.push(d);
    scene.add(d);
  }

  /* JOYSTICK */
  setupJoystick();

  /* USE BUTTON */
  document.getElementById("useBtn").addEventListener("click", useAction);

  /* LOOK CONTROL (RIGHT SIDE DRAG) */
  document.body.addEventListener("touchstart",(e)=>{
    if(e.touches.length===1){
      let x = e.touches[0].clientX;
      if(x > window.innerWidth/2){
        isLooking = true;
        lastX = x;
      }
    }
  });

  document.body.addEventListener("touchmove",(e)=>{
    if(isLooking && e.touches.length===1){
      let x = e.touches[0].clientX;
      let dx = x - lastX;
      lastX = x;

      yaw -= dx * 0.003;
      camera.rotation.y = yaw;
    }
  });

  document.body.addEventListener("touchend",()=>{
    isLooking = false;
  });
}

/* WALL */
function wall(x,y,z,rot=0){
  let w = new THREE.Mesh(
    new THREE.BoxGeometry(20,4,0.2),
    new THREE.MeshStandardMaterial({color:0x555555})
  );
  w.position.set(x,y,z);
  w.rotation.y = rot;
  scene.add(w);
}

/* JOYSTICK */
function setupJoystick(){
  let base = document.getElementById("joystickBase");
  let stick = document.getElementById("joystickStick");

  let center = {x:0,y:0};
  let dragging = false;

  let rect = base.getBoundingClientRect();
  center.x = rect.left + rect.width/2;
  center.y = rect.top + rect.height/2;

  base.addEventListener("touchstart",()=>dragging=true);

  base.addEventListener("touchmove",(e)=>{
    if(!dragging) return;

    let t = e.touches[0];
    let dx = t.clientX - center.x;
    let dy = t.clientY - center.y;

    let max = 40;

    dx = Math.max(-max,Math.min(max,dx));
    dy = Math.max(-max,Math.min(max,dy));

    stick.style.transform = `translate(${dx}px,${dy}px)`;

    moveX = dx/max;
    moveZ = dy/max;
  });

  base.addEventListener("touchend",()=>{
    dragging=false;
    stick.style.transform="translate(0px,0px)";
    moveX=0;
    moveZ=0;
  });
}

/* COLLISION */
function canMove(x,z){
  for(let o of interactables){
    let dx = o.position.x - x;
    let dz = o.position.z - z;
    let dist = Math.sqrt(dx*dx + dz*dz);
    if(dist < 0.6) return false;
  }
  return true;
}

/* ACTION */
function useAction(){
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  let hits = raycaster.intersectObjects(interactables);

  if(hits.length===0) return;

  let obj = hits[0].object;

  if(obj.userData.type==="drawer"){
    if(obj.userData.hasKey){
      keyFound = true;
      alert("🔑 Açar tapıldı!");
    } else {
      alert("Boş çekmece");
    }
  }

  if(obj.userData.type==="door"){
    if(keyFound){
      obj.position.y = -5;
      document.getElementById("win").style.display="flex";
    } else {
      alert("Qapı bağlıdır!");
    }
  }
}

/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  let nextX = camera.position.x + moveX * 0.05;
  let nextZ = camera.position.z + moveZ * 0.05;

  if(canMove(nextX,camera.position.z))
    camera.position.x = nextX;

  if(canMove(camera.position.x,nextZ))
    camera.position.z = nextZ;

  renderer.render(scene,camera);
}
</script>

</body>
  </html>
