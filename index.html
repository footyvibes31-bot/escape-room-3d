<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Escape Room POV</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  canvas { display:block; }

  /* crosshair */
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    transform: translate(-50%, -50%);
    border: 2px solid white;
    border-radius: 50%;
    pointer-events: none;
  }

  #info {
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    font-family:Arial;
  }
</style>
</head>
<body>

<div id="crosshair"></div>
<div id="info">Click to interact</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let interactables = [];
let keyFound = false;

// INIT
init();
animate();

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(0,5,0);
  scene.add(light);

  // FLOOR
  const floorGeo = new THREE.PlaneGeometry(20,20);
  const floorMat = new THREE.MeshStandardMaterial({color:0x333333});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // WALLS (simple room)
  createWall(0,2,-10);
  createWall(0,2,10);
  createWall(-10,2,0, Math.PI/2);
  createWall(10,2,0, Math.PI/2);

  // FURNITURE
  createTable(0,0.75,0);
  createBed(-3,0,-3);

  // 40 DRAWERS
  createDrawers();

  // SECRET NOTE
  createSecretNote(2,2,-9.5);

  window.addEventListener("click", onClick);
}

function createWall(x,y,z,rot=0){
  const geo = new THREE.BoxGeometry(20,4,0.2);
  const mat = new THREE.MeshStandardMaterial({color:0x555555});
  const wall = new THREE.Mesh(geo, mat);
  wall.position.set(x,y,z);
  wall.rotation.y = rot;
  scene.add(wall);
}

function createTable(x,y,z){
  const geo = new THREE.BoxGeometry(2,0.2,1);
  const mat = new THREE.MeshStandardMaterial({color:0x8B5A2B});
  const table = new THREE.Mesh(geo,mat);
  table.position.set(x,y,z);
  scene.add(table);
}

function createBed(x,y,z){
  const geo = new THREE.BoxGeometry(3,0.5,1.5);
  const mat = new THREE.MeshStandardMaterial({color:0x4444aa});
  const bed = new THREE.Mesh(geo,mat);
  bed.position.set(x,y,z);
  scene.add(bed);
}

// 40 drawers (one has key)
function createDrawers(){
  for(let i=0;i<40;i++){
    const geo = new THREE.BoxGeometry(0.3,0.2,0.3);
    const mat = new THREE.MeshStandardMaterial({
      color: i === 17 ? 0xffd700 : 0x777777
    });

    const drawer = new THREE.Mesh(geo,mat);
    drawer.position.set(
      -4 + (i%10)*0.8,
      1,
      -2 + Math.floor(i/10)*0.6
    );

    drawer.userData = {
      type:"drawer",
      hasKey: i === 17
    };

    interactables.push(drawer);
    scene.add(drawer);
  }
}

// secret note (clue)
function createSecretNote(x,y,z){
  const geo = new THREE.PlaneGeometry(1,0.6);
  const mat = new THREE.MeshStandardMaterial({color:0xffffaa});
  const note = new THREE.Mesh(geo,mat);
  note.position.set(x,y,z);
  note.userData = {
    type:"note",
    text:"Səfər... açar 40 çekmecədən birində gizlidir..."
  };

  interactables.push(note);
  scene.add(note);
}

// CLICK INTERACTION
function onClick(){
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

  const hits = raycaster.intersectObjects(interactables);

  if(hits.length > 0){
    const obj = hits[0].object;

    if(obj.userData.type === "drawer"){
      if(obj.userData.hasKey){
        keyFound = true;
        alert("Açar tapıldı!");
      } else {
        alert("Boş çekmece");
      }
    }

    if(obj.userData.type === "note"){
      alert(obj.userData.text);
    }
  }
}

// SIMPLE POV MOVEMENT
document.addEventListener("keydown",(e)=>{
  let speed = 0.2;
  if(e.key==="w") camera.position.z -= speed;
  if(e.key==="s") camera.position.z += speed;
  if(e.key==="a") camera.position.x -= speed;
  if(e.key==="d") camera.position.x += speed;
});

// LOOP
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
</script>

</body>
  </html>
